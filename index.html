    <title>Syncou - Agendamentos</title>
    <script>
      if (typeof window !== 'undefined' && window.fetch) {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get() { return originalFetch; },
            set(v) { /* Ignore overwrite or let it overwrite if desired, but we prevent TypeError */ }
          });
        } catch (e) {}
      }
    </script>
